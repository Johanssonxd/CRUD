<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table de Animales</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2 class="center-align">Gestión de Animales</h2>

        <div class="card-panel">
            <h5 id="titulo-form">Añadir Nuevo Animal</h5>
            <form id="animal-form">
                <input type="hidden" id="animal-id">

                <div class="row">
                    <div class="entrada col s6">
                        <input id="nombre" type="text" class="validate" required>
                        <label for="nombre">Nombre</label>
                    </div>
                    <div class="entrada col s6">
                        <input id="especie" type="text" class="validate" required>
                        <label for="especie">Especie</label>
                    </div>
                </div>
                <div class="row">
                    <div class="entrada col s6">
                        <input id="habitat" type="text" class="validate">
                        <label for="habitat">Hábitat</label>
                    </div>
                    <div class="entrada col s6">
                        <input id="dieta" type="text" class="validate">
                        <label for="dieta">Dieta</label>
                    </div>
                </div>

                <button class="btn waves-effect waves-light" type="submit" name="action">
                    Guardar <i class="material-icons right">send</i>
                </button>
                <button class="btn waves-effect waves-light grey right hide" type="button" id="btn-cancelar">
                    Cancelar Edición
                </button>
            </form>
        </div>

        <div class="card-panel">
            <h5>Lista de Animales</h5>
            <table class="striped responsive-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Especie</th>
                        <th>Hábitat</th>
                        <th>Dieta</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-animales">
                </tbody>
            </table>
        </div>

    </div> <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
